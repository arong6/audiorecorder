<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地音频录制器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 800px;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        .recorder-section {
            margin-bottom: 40px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .record-btn {
            background: #ff4757;
            color: white;
        }
        
        .record-btn:hover {
            background: #ff3742;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
        }
        
        .record-btn.recording {
            background: #ff3838;
            animation: pulse 1.5s infinite;
        }
        
        .stop-btn {
            background: #2ed573;
            color: white;
        }
        
        .stop-btn:hover {
            background: #25cc65;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(46, 213, 115, 0.3);
        }
        
        .download-btn {
            background: #3742fa;
            color: white;
        }
        
        .download-btn:hover {
            background: #2f36e8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(55, 66, 250, 0.3);
        }
        
        .delete-btn {
            background: #ffa502;
            color: white;
        }
        
        .delete-btn:hover {
            background: #ff9500;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 165, 2, 0.3);
        }
        
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        
        .visualizer {
            width: 100%;
            height: 200px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
        }
        
        canvas {
            width: 100%;
            height: 100%;
        }
        
        .timer {
            text-align: center;
            font-size: 3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }
        
        .status {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 10px;
            background: #f1f2f6;
        }
        
        .status.recording {
            background: #ffeaa7;
            color: #e17055;
        }
        
        .status.stopped {
            background: #55efc4;
            color: #00b894;
        }
        
        .recordings-section {
            margin-top: 40px;
        }
        
        .recordings-section h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f2f6;
        }
        
        .recordings-list {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #f1f2f6;
            border-radius: 10px;
            padding: 15px;
        }
        
        .recording-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        
        .recording-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .recording-info {
            flex: 1;
        }
        
        .recording-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .recording-details {
            font-size: 0.9em;
            color: #666;
        }
        
        .recording-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 15px;
            font-size: 14px;
        }
        
        .play-btn {
            background: #1e90ff;
            color: white;
        }
        
        .play-btn.playing {
            background: #ff3838;
        }
        
        .empty-list {
            text-align: center;
            color: #666;
            padding: 40px;
            font-style: italic;
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(255, 71, 87, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 71, 87, 0);
            }
        }
        
        .icon {
            font-size: 1.2em;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 0.9em;
            padding-top: 20px;
            border-top: 1px solid #f1f2f6;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            button {
                width: 100%;
                justify-content: center;
            }
            
            .timer {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 本地音频录制器</h1>
        <p class="subtitle">录制、播放、保存音频文件到本地 | 完全在浏览器中运行</p>
        
        <div class="recorder-section">
            <div class="timer" id="timer">00:00:00</div>
            
            <div class="status" id="status">准备开始录制</div>
            
            <div class="visualizer">
                <canvas id="visualizer"></canvas>
            </div>
            
            <div class="controls">
                <button id="recordBtn" class="record-btn">
                    <span class="icon">●</span> 开始录制
                </button>
                <button id="stopBtn" class="stop-btn" disabled>
                    <span class="icon">■</span> 停止录制
                </button>
                <button id="downloadBtn" class="download-btn" disabled>
                    <span class="icon">↓</span> 保存录音
                </button>
                <button id="deleteBtn" class="delete-btn" disabled>
                    <span class="icon">🗑️</span> 删除录音
                </button>
            </div>
        </div>
        
        <div class="recordings-section">
            <h2>📁 录音文件列表</h2>
            <div class="recordings-list" id="recordingsList">
                <div class="empty-list">暂无录音文件</div>
            </div>
        </div>
        
        <footer>
            <p>使用 Web Audio API 和 MediaRecorder API | 录音文件保存在浏览器本地存储中</p>
            <p>提示：录音文件仅保存在当前浏览器中，清除浏览器数据会删除所有录音</p>
        </footer>
    </div>

    <script src="recorder.js"></script>
</body>
</html>
